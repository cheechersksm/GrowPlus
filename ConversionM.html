<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Conversion and Operations</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$']],
                displayMath: [['$$', '$$']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #6c5ce7;
            --success: #2ec4b6;
            --danger: #e71d36;
            --dark: #011627;
            --light: rgba(246, 249, 252, 0.9);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Custom Background Image applied here */
            background-image: url('https://i.imgur.com/tF86pb8.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .app-container {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 550px;
            text-align: center;
            margin-top: 20px;
        }
        h1 { color: var(--primary); margin-bottom: 5px; font-size: 1.8rem; }
        .subtitle { color: #555; font-size: 0.9rem; margin-bottom: 20px; font-weight: 600; }
        
        .mode-container {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .mode-btn {
            flex: 1;
            padding: 12px;
            font-size: 0.95rem;
            background: #e2e8f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .mode-btn.active {
            background: var(--primary);
            color: white;
        }
        
        .card {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .step-title {
            font-size: 1rem;
            color: var(--secondary);
            margin-top: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .rule-btn {
            padding: 12px;
            border: 2px solid #cbd5e1;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .rule-btn:hover:not([disabled]) { border-color: var(--primary); background: #f0f7ff; }
        .rule-btn.correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .rule-btn.wrong { background: var(--danger) !important; color: white; border-color: var(--danger); }
        
        .input-section {
            margin-top: 20px;
            display: none;
        }
        input[type="text"] {
            padding: 12px;
            width: 50%;
            font-size: 1.2rem;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            text-align: center;
        }
        .submit-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 24px;
            margin-left: 10px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        .feedback { margin-top: 20px; font-weight: 600; min-height: 24px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>⏱️ Time Conversion and Operations</h1>
    <div class="subtitle">Malaysia KSSR Year 4 Mathematics</div>
    
    <div class="mode-container">
        <button class="mode-btn active" id="btn-mode1" onclick="switchMode(1)">Mode 1: Unit Conversion</button>
        <button class="mode-btn" id="btn-mode2" onclick="switchMode(2)">Mode 2: Add / Subtract</button>
    </div>

    <div id="game-box">
        <div class="card" id="question-text">Generating dynamic challenge...</div>
        
        <div class="step-title" id="step1-title">STEP 1: Choose the correct conversion rule</div>
        <div class="btn-grid" id="rule-buttons">
            <button class="rule-btn" id="rule-10" onclick="checkRule(10, this)">× 10</button>
            <button class="rule-btn" id="rule-12" onclick="checkRule(12, this)">× 12</button>
            <button class="rule-btn" id="rule-24" onclick="checkRule(24, this)">× 24</button>
            <button class="rule-btn" id="rule-60" onclick="checkRule(60, this)">× 60</button>
            <button class="rule-btn" id="rule-100" onclick="checkRule(100, this)">× 100</button>
        </div>

        <div class="input-section" id="math-step">
            <div class="step-title">STEP 2: Calculate the final answer</div>
            <p id="formula-text" style="color: #555; font-style: italic; margin-bottom: 15px;"></p>
            <input type="text" id="student-answer" placeholder="Your answer">
            <button class="submit-btn" onclick="checkFinalAnswer()">Submit</button>
            <p id="hint-text" style="font-size: 0.85rem; color: #777; margin-top: 5px;"></p>
        </div>

        <div class="feedback" id="feedback-msg"></div>
    </div>
</div>

<script>
    // --- CONVERSION RULES DICTIONARY (Malaysia Year 4) ---
    const unitRules = [
        { from: "Centuries (Abad)", to: "Decades (Dekad)", rule: 10 },
        { from: "Centuries (Abad)", to: "Years (Tahun)", rule: 100 },
        { from: "Decades (Dekad)", to: "Years (Tahun)", rule: 10 },
        { from: "Years (Tahun)", to: "Months (Bulan)", rule: 12 },
        { from: "Days (Hari)", to: "Hours (Jam)", rule: 24 },
        { from: "Hours (Jam)", to: "Minutes (Minit)", rule: 60 }
    ];

    let currentMode = 1;
    let currentQ = {};

    // --- RANDOM QUESTION GENERATOR ENGINE ---
    function generateDynamicQuestion() {
        // 1. Pick a random conversion setup
        const conversion = unitRules[Math.floor(Math.random() * unitRules.length)];
        const formatType = Math.floor(Math.random() * 3); // 0 = Whole, 1 = Fraction, 2 = Decimal
        
        let value, valueText, mathValue, answer;

        if (formatType === 0) {
            // Whole numbers (e.g. 2, 3, 5, etc.)
            value = Math.floor(Math.random() * 5) + 2; 
            valueText = `${value}`;
            mathValue = value;
        } else if (formatType === 1) {
            // Fractions (Only KSSR standard fractions like 1/2, 1/4, 1/5, 3/4, 1/10)
            const fractions = [
                { text: "\\frac{1}{2}", val: 0.5 },
                { text: "\\frac{1}{4}", val: 0.25 },
                { text: "\\frac{3}{4}", val: 0.75 },
                { text: "\\frac{1}{5}", val: 0.2 },
                { text: "\\frac{1}{10}", val: 0.1 }
            ];
            // Filter out decimals that would result in fractional outcomes (e.g. 1/4 of 10 = 2.5)
            const viableFractions = fractions.filter(f => (f.val * conversion.rule) % 1 === 0);
            const selection = viableFractions[Math.floor(Math.random() * viableFractions.length)] || fractions[0];
            
            valueText = `$${selection.text}$`;
            mathValue = selection.val;
        } else {
            // Decimals (Only standard KSSR decimals like 0.5, 1.5, 0.2, 2.5)
            const decimals = [0.5, 1.5, 0.2, 2.5, 0.1];
            const viableDecimals = decimals.filter(d => (d * conversion.rule) % 1 === 0);
            const selection = viableDecimals[Math.floor(Math.random() * viableDecimals.length)] || 0.5;
            
            valueText = `${selection}`;
            mathValue = selection;
        }

        answer = mathValue * conversion.rule;

        if (currentMode === 1) {
            // MODE 1: Directly Convert
            currentQ = {
                qText: `Convert ${valueText} ${conversion.from} to ${conversion.to}`,
                qPlain: `Convert ${mathValue} ${conversion.from} to ${conversion.to}`,
                rule: conversion.rule,
                ans: answer.toString(),
                hint: `Hint: Multiply the value by the conversion factor (${mathValue} × ${conversion.rule}).`
            };
        } else {
            // MODE 2: Add or Subtract
            const isAddition = Math.random() < 0.5;
            let offsetVal, offsetText, finalAns;

            // Generate a secondary unit-matched value to add/subtract
            if (conversion.rule === 60) {
                offsetVal = [10, 15, 20, 30][Math.floor(Math.random() * 4)];
                offsetText = `${offsetVal} Minutes (Minit)`;
            } else if (conversion.rule === 12) {
                offsetVal = [2, 3, 4, 6][Math.floor(Math.random() * 4)];
                offsetText = `${offsetVal} Months (Bulan)`;
            } else if (conversion.rule === 10) {
                offsetVal = [1, 2, 3, 5][Math.floor(Math.random() * 4)];
                offsetText = `${offsetVal} Decades/Years`;
            } else {
                offsetVal = Math.floor(Math.random() * 5) + 1;
                offsetText = `${offsetVal} ${conversion.to}`;
            }

            if (isAddition) {
                finalAns = answer + offsetVal;
                currentQ = {
                    qText: `${valueText} ${conversion.from} + ${offsetVal} ${conversion.to} = ______ ${conversion.to}`,
                    qPlain: `${mathValue} ${conversion.from} + ${offsetVal} ${conversion.to}`,
                    rule: conversion.rule,
                    ans: finalAns.toString(),
                    hint: `Hint: Convert ${valueText} into ${conversion.to} first, then add ${offsetVal}.`
                };
            } else {
                // Ensure subtraction results in a positive number
                if (answer <= offsetVal) {
                    answer += offsetVal + 5;
                    mathValue = answer / conversion.rule;
                    valueText = (formatType === 1) ? `$${mathValue}$` : `${mathValue}`;
                }
                finalAns = answer - offsetVal;
                currentQ = {
                    qText: `${valueText} ${conversion.from} - ${offsetVal} ${conversion.to} = ______ ${conversion.to}`,
                    qPlain: `${mathValue} ${conversion.from} - ${offsetVal} ${conversion.to}`,
                    rule: conversion.rule,
                    ans: finalAns.toString(),
                    hint: `Hint: Convert ${valueText} into ${conversion.to} first, then subtract ${offsetVal}.`
                };
            }
        }

        // Render Question Card
        document.getElementById("question-text").innerHTML = currentQ.qText;
        
        // Trigger MathJax to compile LaTeX fractions instantly
        MathJax.typesetPromise();
    }

    function switchMode(modeNum) {
        currentMode = modeNum;
        document.getElementById("btn-mode1").classList.toggle("active", modeNum === 1);
        document.getElementById("btn-mode2").classList.toggle("active", modeNum === 2);
        
        if(modeNum === 1) {
            document.getElementById("step1-title").innerText = "STEP 1: Choose the correct conversion rule";
        } else {
            document.getElementById("step1-title").innerText = "STEP 1: Identify the main conversion rule needed";
        }

        loadQuestion();
    }

    function loadQuestion() {
        document.getElementById("math-step").style.display = "none";
        document.getElementById("feedback-msg").innerText = "";
        document.getElementById("student-answer").value = "";
        
        let buttons = document.querySelectorAll("#rule-buttons .rule-btn");
        buttons.forEach(btn => {
            btn.className = "rule-btn";
            btn.disabled = false;
        });

        generateDynamicQuestion();
    }

    function checkRule(selectedRule, buttonElement) {
        if (selectedRule === currentQ.rule) {
            buttonElement.className = "rule-btn correct";
            document.querySelectorAll("#rule-buttons .rule-btn").forEach(btn => {
                if(btn !== buttonElement) btn.disabled = true;
            });
            
            document.getElementById("feedback-msg").style.color = "var(--success)";
            document.getElementById("feedback-msg").innerText = "Correct! Move on to the calculation.";
            
            document.getElementById("formula-text").innerText = `Use the rule ( × ${currentQ.rule} ) to complete Step 2.`;
            document.getElementById("hint-text").innerText = currentQ.hint;
            document.getElementById("math-step").style.display = "block";
        } else {
            buttonElement.className = "rule-btn wrong";
            document.getElementById("feedback-msg").style.color = "var(--danger)";
            document.getElementById("feedback-msg").innerText = "Not that rule! Check your units again.";
        }
    }

    function checkFinalAnswer() {
        const studentAns = document.getElementById("student-answer").value.trim();
        const feedback = document.getElementById("feedback-msg");

        if (studentAns === currentQ.ans) {
            feedback.style.color = "var(--success)";
            feedback.innerText = "Superb job! That's correct! 🎉 Preparing next question...";
            sendDataToGoogleSheets(currentQ.qPlain, true);
            setTimeout(loadQuestion, 2500);
        } else {
            feedback.style.color = "var(--danger)";
            feedback.innerText = `Incorrect. Try again! Double check your math.`;
            sendDataToGoogleSheets(currentQ.qPlain, false);
        }
    }

    function sendDataToGoogleSheets(question, isCorrect) {
        const webAppUrl = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL"; 
        if(webAppUrl.includes("YOUR_")) return; 

        fetch(webAppUrl, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                studentId: "Student_Year_4",
                mode: "Mode " + currentMode,
                question: question,
                result: isCorrect ? "Correct" : "Incorrect",
                timestamp: new Date().toISOString()
            })
        });
    }

    window.onload = () => switchMode(1);
</script>
</body>
</html>
