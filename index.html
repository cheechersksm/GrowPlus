<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROWPLUS</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GrowPlus">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0fdf4; color: #166534; }
        .hide { display: none !important; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-radius: 1rem; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 4px 10px -1px rgba(0, 0, 0, 0.08); }
        .btn-green { background-color: #10b981; color: white; transition: all 0.2s; }
        .btn-green:hover { background-color: #059669; }
        #view-login { background-image: linear-gradient(rgba(240, 253, 244, 0.25), rgba(6, 95, 70, 0.45)), url('https://i.imgur.com/zX5CkzC.jpg'); background-size: cover; background-position: center; }
    </style>
</head>
<body>

    <div id="loader" class="hide fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
        <i class="ph-bold ph-spinner-gap animate-spin text-5xl text-emerald-500 mb-4"></i>
        <p class="text-emerald-700 font-medium">Authenticating profile security...</p>
    </div>

    <div id="view-login" class="min-h-screen flex flex-col lg:flex-row items-center justify-center p-4 gap-8">
        <div class="glass-panel w-full max-w-md p-6 border-l-4 border-emerald-500">
            <h3 class="text-lg font-bold text-emerald-800 mb-4 flex items-center"><i class="ph ph-megaphone-simple mr-2 text-xl text-emerald-500"></i>Latest Announcements</h3>
            <div id="loginAnnouncements" class="space-y-4">
                <p class="text-sm text-gray-500">Loading teacher announcements...</p>
            </div>
        </div>

        <div class="glass-panel w-full max-w-md p-8 text-center">
            <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="ph-fill ph-plant text-4xl text-emerald-500"></i>
            </div>
            <h1 class="text-3xl font-bold text-emerald-800 mb-2">GROWPLUS</h1>
            <p class="text-emerald-600 mb-8 text-sm">Version 1.2 (4 JULY 2026)</p>

            <form id="loginForm" class="space-y-4 text-left">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email / MOE ID</label>
                    <input type="text" id="loginEmail" required class="w-full px-4 py-2 rounded-lg border border-gray-300 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="m-1234567@moe-dl.edu.my">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="loginPassword" required class="w-full px-4 py-2 rounded-lg border border-gray-300 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="••••••••">
                </div>
                <button type="submit" class="btn-green w-full py-3 rounded-lg font-semibold mt-4 shadow-md">Sign In</button>
            </form>
            
            <div class="mt-8 pt-6 border-t border-gray-200">
                <p class="text-sm text-gray-500 mb-3">For Parents & Guardians</p>
                <button onclick="switchView('parent')" class="w-full py-2 bg-white border-2 border-emerald-500 text-emerald-600 rounded-lg font-medium">Public Dashboard View</button>
            </div>
        </div>
    </div>

    <!-- ==================== PARENT VIEW ==================== -->
    <div id="view-parent" class="hide min-h-screen p-4 md:p-8 bg-gray-50">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-emerald-800"><i class="ph ph-users-three mr-2"></i>Parent Dashboard</h2>
                <button onclick="exitParentView()" class="text-gray-600 hover:text-emerald-600"><i class="ph ph-sign-out mr-1"></i>Back to Login</button>
            </div>
            
            <div class="glass-panel p-6 mb-8 flex flex-wrap gap-4">
                <input type="text" id="parentIcInput" placeholder="Enter Student IC (e.g., 080101141234)" class="flex-1 px-4 py-2 rounded-lg border border-gray-300 outline-none focus:ring-2 focus:ring-emerald-500">
                <button onclick="searchParent()" id="btnSearchParent" class="btn-green px-6 py-2 rounded-lg font-medium">Search</button>
            </div>

            <div id="parentResults" class="hide space-y-6">
                <!-- Metadata Info Banner -->
                <div class="glass-panel p-6 bg-gradient-to-r from-emerald-50 to-teal-50 border border-emerald-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div>
                        <p class="text-xs font-semibold text-emerald-600 uppercase tracking-wider">Student Profile</p>
                        <h3 id="parentStudentName" class="text-xl font-bold text-emerald-900">-</h3>
                        <p id="parentStudentClass" class="text-sm text-emerald-700 font-medium">Class: -</p>
                    </div>
                    <div class="text-left md:text-right">
                        <p class="text-xs font-semibold text-emerald-600 uppercase tracking-wider">Work Submission Rate</p>
                        <h4 id="parentSubmissionRate" class="text-3xl font-extrabold text-emerald-800">-</h4>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Homework Status -->
                    <div class="glass-panel p-6">
                        <h3 class="text-lg font-semibold mb-4 flex items-center"><i class="ph ph-books mr-2 text-emerald-500"></i>Homework Status</h3>
                        <div id="parentHomework" class="space-y-3 max-h-64 overflow-y-auto pr-2"></div>
                    </div>
                    <!-- Exam Analysis -->
                    <div class="glass-panel p-6">
                        <h3 class="text-lg font-semibold mb-4 flex items-center"><i class="ph ph-exam mr-2 text-emerald-500"></i>Exam Analysis</h3>
                        <div id="parentExams" class="space-y-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
 const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbydRg1QQtxTNrkN01kMHokW6DP1j7fqrlwtHeDoCt_F2J8-c1XMdMWx9CI44M8K06gzbA/exec"; 

        const api = {
            run: async function(functionName, ...args) {
                // We send a POST request formatted as plain text to bypass strict browser CORS rules
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        func: functionName, 
                        args: args 
                    }),
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    }
                });
                
                const result = await response.json();
                if (result.error) {
                    throw new Error(result.error);
                }
                return result.data;
            }
        };

        window.onload = function() { loadAnnouncements(); };
        function switchView(id) {
            document.getElementById('view-login').classList.add('hide');
            document.getElementById('view-parent').classList.add('hide');
            document.getElementById(`view-${id}`).classList.remove('hide');
        }

        // Handle submission and routing to App.html
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('loader').classList.remove('hide');
            
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value.trim();

            try {
                const res = await api.run('loginUser', email, pass);
                if (res.success) {
                    // Lock token credentials securely inside the localized browser sandbox cache
                    localStorage.setItem('loggedInUserEmail', res.user.Email);
                    
                    // Fetch deployment address context dynamically, then append structural route
                    const baseUrl = await api.run('getWebAppUrl');
                    window.top.location.href = baseUrl + "?page=app";
                } else {
                    document.getElementById('loader').classList.add('hide');
                    Swal.fire('Login Error', res.message, 'error');
                }
            } catch(err) {
                document.getElementById('loader').classList.add('hide');
                Swal.fire('Error', 'Connection failed', 'error');
            }
        });

        async function loadAnnouncements() {
            try {
                const ann = await api.run('getAnnouncements');
                const container = document.getElementById('loginAnnouncements');
                if (ann && ann.length > 0) {
                    container.innerHTML = ann.map(a => `
                        <div class="p-3 bg-emerald-50/50 rounded border border-emerald-100">
                            <span class="text-xs text-emerald-600 font-semibold">${new Date(a.Date).toLocaleDateString()}</span>
                            <p class="text-sm text-gray-700 font-medium whitespace-pre-wrap mt-1">${a.Announcement}</p>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="text-sm text-gray-500 italic">No announcements available.</p>';
                }
            } catch(e) {
                console.error(e);
            }
        }


        function exitParentView() {
            document.getElementById('parentIcInput').value = '';
            document.getElementById('parentStudentName').innerText = '-';
            document.getElementById('parentStudentClass').innerText = 'Class: -';
            document.getElementById('parentSubmissionRate').innerText = '-';
            document.getElementById('parentHomework').innerHTML = '';
            document.getElementById('parentExams').innerHTML = '';
            
            document.getElementById('parentResults').classList.add('hide');
            switchView('login');
        }

        async function searchParent() {
            const ic = document.getElementById('parentIcInput').value.trim();
            if(!ic) return;
            const btn = document.getElementById('btnSearchParent');
            btn.innerText = 'Processing...'; btn.disabled = true;
            
            try {
                const res = await api.run('getParentData', ic);
                if(res.success) {
                    document.getElementById('parentResults').classList.remove('hide');
                    
                    document.getElementById('parentStudentName').innerText = res.student.FullName;
                    document.getElementById('parentStudentClass').innerText = `Class: ${res.student.Class || 'N/A'}`;
                    
                    const emailLower = res.student.Email.trim().toLowerCase();
                    
                    const targetedAssignments = res.assignments.filter(a => {
                        const targetStr = String(a.AssignedTo || '').trim();
                        if (!targetStr || targetStr.toLowerCase() === 'all') return true;
                        const targetEmails = targetStr.toLowerCase().split(',').map(e => e.trim());
                        return targetEmails.includes(emailLower);
                    });
                    
                    const totalTargeted = targetedAssignments.length;
                    const completedSubs = res.submissions.filter(s => s.Submitted === 'Yes');
                    const submissionRate = totalTargeted > 0 ? ((completedSubs.length / totalTargeted) * 100).toFixed(1) : 0;
                    document.getElementById('parentSubmissionRate').innerText = `${submissionRate}%`;
                    
                    const hwHtml = targetedAssignments.map(a => {
                        const sub = res.submissions.find(s => String(s.AssignmentId).trim() === String(a.Id).trim());
                        let badgeHtml = '';
                        if (sub) {
                            if (sub.Graded === 'Yes') {
                                badgeHtml = `<span class="px-2 py-1 rounded text-xs font-semibold bg-emerald-100 text-emerald-700">Score: ${sub.Score}/10</span>`;
                            } else {
                                badgeHtml = `<span class="px-2 py-1 rounded text-xs font-semibold bg-yellow-100 text-yellow-700">Pending Grading</span>`;
                            }
                        } else {
                            badgeHtml = `<span class="px-2 py-1 rounded text-xs font-semibold bg-red-100 text-red-700">Unsubmitted</span>`;
                        }
                        
                        return `
                            <div class="flex justify-between items-center text-sm border-b border-gray-100 pb-2">
                                <span class="font-medium text-gray-700">${a.Title}</span>
                                ${badgeHtml}
                            </div>
                        `;
                    }).join('');
                    document.getElementById('parentHomework').innerHTML = hwHtml || '<p class="text-sm text-gray-400 italic">No tasks found.</p>';
                    
                    const exHtml = res.exams.map(e => {
                        let badgeClass = 'bg-gray-100 text-gray-700 border-gray-300';
                        if (e.Grade === 'E') badgeClass = 'bg-orange-100 text-orange-700 border-orange-200';
                        if (e.Grade === 'F') badgeClass = 'bg-red-100 text-red-700 border-red-200';
                        if (e.Grade === 'A' || e.Grade === 'B' || e.Grade === 'C' || e.Grade === 'D') badgeClass = 'bg-emerald-100 text-emerald-700 border-emerald-200';
                        
                        return `
                            <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg border border-gray-100">
                                <span class="font-medium text-gray-700">${e.ExamName}</span>
                                <div class="text-right">
                                    <span class="font-bold text-gray-900">${e.Score}%</span>
                                    <span class="ml-2 text-xs font-bold px-2 py-1 border rounded-md ${badgeClass}">Grade ${e.Grade}</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                    document.getElementById('parentExams').innerHTML = exHtml || '<p class="text-sm text-gray-400 italic">No exam entries.</p>';
                } else {
                    Swal.fire('No student found', res.message, 'warning');
                }
            } catch(e) { console.error(e); }
            btn.innerText = 'Search'; btn.disabled = false;
        }
    </script>
</body>
</html>
